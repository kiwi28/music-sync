services:
  # ── PocketBase ──
  pocketbase:
    build:
      context: .
      dockerfile: pocketbase.Dockerfile
    container_name: musicsync-pb
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - pb_data:/pb_data
    environment:
      - PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL:-admin@musicsync.local}
      - PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD:-change-me}
    restart: unless-stopped

  # ── Next.js app ──
  app:
    build: .
    container_name: musicsync-app
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - NODE_ENV=production
      - POCKETBASE_URL=http://pocketbase:8090
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}
      - NEXT_PUBLIC_POCKETBASE_URL=${NEXT_PUBLIC_POCKETBASE_URL}
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pb_data:
