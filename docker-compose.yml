services:
  # ── PocketBase ──
  pocketbase:
    build:
      context: .
      dockerfile: pocketbase.Dockerfile
    container_name: musicsync-pb
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - pb_data:/pb_data
    environment:
      - PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL:-admin@musicsync.local}
      - PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD:-change-me}
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY}
    restart: unless-stopped

  # ── Background worker (spotdl / yt-dlp) ──
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: musicsync-worker
    user: "1001:1001"
    volumes:
      - music:/music
      - spotdl_config:/home/node/.spotdl
    environment:
      - POCKETBASE_URL=http://pocketbase:8090
      - PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL:-admin@musicsync.local}
      - PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD:-change-me}
      - MUSIC_DIR=/music
      - POLL_INTERVAL=15000
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-10080}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-}
      - YOUTUBE_COOKIES=${YOUTUBE_COOKIES:-}
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js app ──
  app:
    build: .
    container_name: musicsync-app
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - music:/music
    environment:
      - MUSIC_DIR=/music
      - PORT=3100
      - NODE_ENV=production
      - POCKETBASE_URL=http://pocketbase:8090
      - NEXT_PUBLIC_POCKETBASE_URL=${NEXT_PUBLIC_POCKETBASE_URL}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-}
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

  # ── Navidrome music streamer ──
  navidrome:
    image: deluan/navidrome:0.63.2
    container_name: musicsync-navidrome
    volumes:
      - music:/music:ro
      - navidrome_data:/data
    environment:
      ND_MUSICFOLDER: /music
      ND_PORT: 4533
      ND_LOGLEVEL: info
      ND_ENABLETRANSCODINGCONFIG: "true"
      ND_ENABLESHARING: "true"
      # First-time setup: create an admin user via the web UI at spoty.kiw.ro
      # Or set ND_ADMINUSER / ND_ADMINPASSWORD env vars for headless setup.
    ports:
      - "127.0.0.1:4533:4533"
    restart: unless-stopped

volumes:
  pb_data:
  music:
  navidrome_data:
  spotdl_config:
