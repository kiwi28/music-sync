# ── musicsync.kiw.ro (+ pb.musicsync.kiw.ro) ──
# Place at: /etc/nginx/sites-available/musicsync.kiw.ro
# Enable:   ln -s /etc/nginx/sites-available/musicsync.kiw.ro /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
#
# SSL first-timer: certbot certonly --manual --preferred-challenges dns -d "musicsync.kiw.ro" -d "*.musicsync.kiw.ro"
# Then switch the ssl_certificate paths below from /wildcard/ to /musicsync.kiw.ro/ (or just use the wildcard path).


# ═══════════════════════════════════════════
# HTTP → HTTPS redirect (both domains)
# ═══════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name musicsync.kiw.ro pb.musicsync.kiw.ro spoty.kiw.ro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════
# musicsync.kiw.ro — Next.js app :3100
# ═══════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name musicsync.kiw.ro;

    # ── SSL (managed by certbot) ──
    ssl_certificate     /etc/letsencrypt/live/musicsync.kiw.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/musicsync.kiw.ro/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/musicsync.kiw.ro/chain.pem;

    # Modern TLS — A+ on SSL Labs
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP: allow PocketBase SSE, inline styles from Next.js, self + spotify images,
    # and SVAR's CDN for file-manager icons, fonts, and stylesheets.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://cdn.svar.dev; img-src 'self' data: https://i.scdn.co https://*.scdn.co https://cdn.svar.dev; connect-src 'self' http://127.0.0.1:8090; font-src 'self' https://cdn.svar.dev; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Logs ──
    access_log /var/log/nginx/musicsync.access.log;
    error_log  /var/log/nginx/musicsync.error.log;

    client_max_body_size 200m;

    # ── Next.js app :3100 ──
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR + PocketBase real-time via proxy)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── PocketBase API proxy (browser auth + direct queries) ──
    # The browser PocketBase SDK uses NEXT_PUBLIC_POCKETBASE_URL=https://musicsync.kiw.ro/pb
    # This strips the /pb prefix and forwards to PocketBase on :8090.
    # Auth cookies set here are on musicsync.kiw.ro, so Next.js server-side can read them too.
    location /pb/ {
        rewrite ^/pb/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket for real-time subscriptions
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;

        # PocketBase sets cookies — make sure they work on this domain
        proxy_cookie_path / /pb/;
    }

    # Auth endpoint
    location /api/pocketbase/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Static assets — content-hashed, cache aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
    }
}

# ═══════════════════════════════════════════
# pb.musicsync.kiw.ro — PocketBase admin :8090
# ═══════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pb.musicsync.kiw.ro;

    # ── SSL (same cert family — switch to wildcard if using *.musicsync.kiw.ro) ──
    ssl_certificate     /etc/letsencrypt/live/musicsync.kiw.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/musicsync.kiw.ro/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/musicsync.kiw.ro/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # ── Logs ──
    access_log /var/log/nginx/musicsync-pb.access.log;
    error_log  /var/log/nginx/musicsync-pb.error.log;

    # PocketBase handles file uploads
    client_max_body_size 50m;

    # ── PocketBase :8090 ──
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (PocketBase real-time subscriptions)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }
}

# ═══════════════════════════════════════════
# spoty.kiw.ro — Navidrome music streamer :4533
# ═══════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name spoty.kiw.ro;

    # ── SSL ──
    ssl_certificate     /etc/letsencrypt/live/musicsync.kiw.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/musicsync.kiw.ro/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/musicsync.kiw.ro/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Relaxed CSP for Navidrome — it serves its own scripts, styles, and
    # media (audio streams, album art). Allows inline styles needed by the
    # React-based web UI.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; font-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Logs ──
    access_log /var/log/nginx/musicsync-navidrome.access.log;
    error_log  /var/log/nginx/musicsync-navidrome.error.log;

    client_max_body_size 50m;

    # ── Navidrome :4533 ──
    location / {
        proxy_pass http://127.0.0.1:4533;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Navidrome player status updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeouts for audio streaming
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;

        # Buffering disabled for streaming — Navidrome handles range
        # requests for seeking within tracks.
    }
}
