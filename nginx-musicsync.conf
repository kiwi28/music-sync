# ── musicsync.kiw.ro ──
# Place at: /etc/nginx/sites-available/musicsync.kiw.ro
# Enable: ln -s /etc/nginx/sites-available/musicsync.kiw.ro /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name musicsync.kiw.ro;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name musicsync.kiw.ro;

    # ── SSL (managed by certbot) ──
    ssl_certificate     /etc/letsencrypt/live/musicsync.kiw.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/musicsync.kiw.ro/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/musicsync.kiw.ro/chain.pem;

    # Modern TLS — A+ on SSL Labs
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP: allow PocketBase SSE, inline styles from Next.js, self + spotify images
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.scdn.co https://*.scdn.co; connect-src 'self' http://127.0.0.1:8090; font-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Rate limiting (auth endpoints) ──
    limit_req_zone $binary_remote_addr zone=musicsync_auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=musicsync_api:10m rate=60r/m;

    # ── Logs ──
    access_log /var/log/nginx/musicsync.access.log;
    error_log  /var/log/nginx/musicsync.error.log;

    # Max body size for playlists/tracks
    client_max_body_size 10m;

    # ── Next.js app (port 3100) ──
    location / {
        limit_req zone=musicsync_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR + PocketBase real-time via proxy)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts — keep connections alive for SSE/streaming
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Don't buffer SSE responses
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Auth endpoint rate limiting ──
    location /api/pocketbase/ {
        limit_req zone=musicsync_auth burst=5 nodelay;

        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # ── Static assets (immutable hashed files) ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Next.js static files have content hashes — cache aggressively
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Deny dotfiles ──
    location ~ /\. {
        deny all;
        access_log off;
    }
}
